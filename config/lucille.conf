{
    "framework": {
        "version": "1.0.0",
        "name": "Lucille",
        "parallel_threads": 5,
        "timeout": 30,
        "output_format": "json",
        "description": "Advanced Reconnaissance Framework",
        "verbose": false
    },
    "modules": {
        "enabled": [
            "port_scan",
            "subdomain_enum",
            "dns_recon",
            "whois",
            "web_scan",
            "ssl_cert",
            "header_analysis",
            "technology_id",
            "directory_brute"
        ],
        "timeout": 30,
        "quick_modules": [
            "port_scan",
            "web_scan",
            "header_analysis"
        ],
        "retry_count": 2
    },
    "scanning": {
        "port_range": "1-65535",
        "common_ports": "22,25,53,80,110,143,443,445,3306,3389,5432,5984,6379,8080,8443,9000,27017",
        "wordlist": "data/wordlists/common.txt",
        "user_agent": "Lucille/1.0 (Security Assessment Tool)",
        "wordlist_dirs": "data/wordlists/dirsearch.txt",
        "threads": 4,
        "timeout_per_request": 10
    },
    "api": {
        "shodan_key": "",
        "virustotal_key": "",
        "hibp_enabled": true,
        "timeout": 10,
        "censys_id": "",
        "censys_secret": "",
        "retry_timeout": 5
    },
    "output": {
        "directory": "results",
        "formats": [
            "json",
            "csv",
            "html",
            "txt"
        ],
        "include_details": true,
        "create_timestamp_dir": true
    },
    "performance": {
        "cache_results": true,
        "cache_ttl": 86400,
        "parallel_limit": 10,
        "batch_size": 50
    },
    "ssl": {
        "verify": false,
        "timeout": 10
    },
    "logging": {
        "level": "INFO",
        "file": "lucille.log",
        "console": true
    }
}